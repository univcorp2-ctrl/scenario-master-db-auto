name: README setup guide

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/setup-guide-trigger.md
      - .github/workflows/readme-setup-guide.yml

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download visual guide installer
        run: curl -fsSL https://raw.githubusercontent.com/univcorp2-ctrl/line-sheet-digest/main/scripts/install_readme_visual_guide.py -o /tmp/install_readme_visual_guide.py
      - name: Install visual setup guide
        run: python /tmp/install_readme_visual_guide.py
      - name: Commit README and guide assets
        run: |
          if git diff --quiet README.md docs; then
            echo "README and guide assets already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/assets/readme-setup-guide.svg docs/setup-visual-guide.md docs/image-generation-prompts.md
          git commit -m "Install README visual setup guide"
          git push
